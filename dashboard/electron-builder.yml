appId: dev.ivanbatista.pulpo
productName: PULPO
copyright: Copyright © 2026 Iván Batista Herrero
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
extraResources:
  - from: build/icon.png
    to: icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  maintainer: Iván Batista Herrero
  icon: build/icon.png
win:
  target:
    - target: nsis
      arch: [x64]
  executableName: PULPO
  icon: build/icon.svg
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
